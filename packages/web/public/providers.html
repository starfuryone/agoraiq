<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#08090d"/>
<title>Provider IQ — AgoraIQ</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Albert+Sans:wght@400;500;600&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/providers.css"/>
<style>
/* ── Base reset + theme tokens (matches dashboard.html exactly) ── */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#08090d;  --bg2:#0d0f16; --bg3:#12151f; --bg4:#161925;
  --border:#1e2235;
  --text:#c8d0e8; --muted:#4a5270;
  --cyan:#00d4ff; --green:#10b981; --red:#ef4444; --amber:#f59e0b;
  --font-display:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
}
html { scroll-behavior:smooth; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--font-display);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  position:fixed; top:0; left:0; bottom:0; width:220px;
  background:var(--bg2); border-right:1px solid var(--border);
  padding:24px 0; z-index:100; display:flex; flex-direction:column;
  overflow-y:auto;
}
.sidebar-logo {
  display:flex; align-items:center; gap:10px;
  padding:0 20px 24px; border-bottom:1px solid var(--border);
  margin-bottom:20px; text-decoration:none;
}
.sidebar-logo .mark { font-weight:800; font-size:18px; letter-spacing:-0.5px; color:var(--text); }
.sidebar-logo .mark .iq { color:var(--cyan); }
.sidebar-label {
  font-size:9px; text-transform:uppercase; letter-spacing:1.5px;
  color:var(--muted); padding:0 20px; margin-bottom:6px; margin-top:4px;
}
.sidebar-nav { padding:0 12px; margin-bottom:20px; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 10px; border-radius:8px;
  color:var(--muted); font-size:12px; font-weight:500;
  cursor:pointer; transition:all .15s; text-decoration:none;
}
.nav-item:hover { background:var(--bg3); color:var(--text); }
.nav-item.active {
  background:rgba(0,212,255,.06); color:var(--cyan);
  border:1px solid rgba(0,212,255,.15);
}
.nav-icon { font-size:14px; width:16px; text-align:center; }
.nav-badge {
  margin-left:auto; background:var(--cyan); color:var(--bg);
  font-size:9px; padding:1px 5px; border-radius:10px; font-weight:600;
}
.sidebar-spacer { flex:1; }
.sidebar-plan {
  margin:0 12px; padding:14px; background:var(--bg3);
  border:1px solid var(--border); border-radius:10px;
}
.plan-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.plan-name { font-weight:700; font-size:13px; color:var(--cyan); font-family:var(--font-mono); }
.plan-btn {
  display:block; margin-top:8px; text-align:center;
  font-size:10px; color:var(--cyan); text-decoration:none;
  padding:4px 0; border:1px solid rgba(0,212,255,.2); border-radius:6px;
}
.plan-btn:hover { background:rgba(0,212,255,.06); }

/* ── Main area ───────────────────────────────────────────── */
.main { margin-left:220px; min-height:100vh; display:flex; flex-direction:column; }

/* ── Topbar ──────────────────────────────────────────────── */
.topbar {
  height:56px; background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; flex-shrink:0;
}
.topbar-left { display:flex; align-items:center; gap:12px; }
.topbar-title { font-size:13px; font-weight:700; color:var(--text); }
.topbar-breadcrumb { font-size:11px; color:var(--muted); margin-top:1px; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.user-email { font-size:11px; color:var(--muted); font-family:var(--font-mono); }
.btn-logout {
  background:none; border:1px solid var(--border); border-radius:6px;
  color:var(--muted); font-size:10px; padding:4px 10px; cursor:pointer;
  font-family:var(--font-display);
}
.btn-logout:hover { color:var(--text); border-color:var(--muted); }

/* ── Content ─────────────────────────────────────────────── */
.content { flex:1; padding:24px 28px 48px; max-width:1100px; width:100%; }

/* ── Responsive ──────────────────────────────────────────── */
@media(max-width:768px) {
  .sidebar { width:0; overflow:hidden; }
  .main { margin-left:0; }
  .topbar { padding:0 16px; }
  .content { padding:16px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar">
    <a class="sidebar-logo" href="/">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="mark">Agora<span class="iq">IQ</span></span>
    </a>

    <div class="sidebar-label">Intelligence</div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/dashboard">
        <span class="nav-icon">◈</span> Overview
      </a>
      <a class="nav-item" href="/dashboard?p=signals">
        <span class="nav-icon">◆</span> Live Signals
      </a>
      <a class="nav-item active" href="/providers">
        <span class="nav-icon">🧠</span> Provider IQ
        <span class="nav-badge" style="background:var(--amber);color:var(--bg);font-size:8px">ELITE</span>
      </a>
      <a class="nav-item" href="/dashboard?p=providers">
        <span class="nav-icon">◎</span> Providers
      </a>
    </nav>

    <div class="sidebar-label">Markets</div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/markets" style="display:flex;align-items:center;gap:10px">
        <span class="nav-icon">⊞</span> Markets Console
      </a>
      <a class="nav-item" href="/marketplace">
        <span class="nav-icon">◇</span> Marketplace
      </a>
    </nav>

    <div class="sidebar-label">Account</div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/dashboard?p=settings">
        <span class="nav-icon">⚙</span> Settings
      </a>
    </nav>

    <div class="sidebar-spacer"></div>
    <div class="sidebar-plan">
      <div class="plan-label">Current Plan</div>
      <div class="plan-name" id="plan-name">—</div>
      <a class="plan-btn" href="/pricing">Manage Plan</a>
    </div>
  </aside>

  <!-- ═══ Main ═══ -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div>
          <div class="topbar-title">Provider Intelligence Score</div>
          <div class="topbar-breadcrumb" id="piq-breadcrumb">Leaderboard</div>
        </div>
      </div>
      <div class="topbar-right">
        <span class="user-email" id="user-email"></span>
        <button class="btn-logout" onclick="clearToken();window.location.href='/login'">Logout</button>
      </div>
    </header>

    <div class="content" id="piq-content">
      <div class="piq-loading">Loading…</div>
    </div>
  </div>

</div>

<!-- ═══ Toast (matches app.js) ═══ -->
<div id="toast" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:none;
  padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s"></div>

<!-- ═══ Scripts ═══ -->
<script src="/assets/app.js"></script>
<script src="/assets/providers.js"></script>
<script>
  // Auth gate — redirect if no token
  if (!getToken()) {
    window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
  } else {
    pageInit();
  }
</script>
</body>
</html>
