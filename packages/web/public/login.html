<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgoraIQ — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Albert+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
<style>
  .auth-wrap {
    min-height: calc(100vh - 60px);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px; position: relative; z-index: 1;
  }
  .auth-card {
    width: 100%; max-width: 400px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 32px;
    position: relative; overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute; top: -80px; right: -80px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(0,212,255,.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .auth-title { font-family:'Syne',sans-serif; font-weight:800; font-size:20px; color:var(--text); text-align:center; margin-bottom:4px; }
  .auth-sub { font-size:11px; color:var(--muted); text-align:center; margin-bottom:28px; }
  .auth-footer { text-align:center; margin-top:20px; font-size:11px; color:var(--muted); }
  .auth-footer a { color:var(--cyan); text-decoration:none; }
  .divider-text { display:flex; align-items:center; gap:12px; font-size:10px; color:var(--muted); margin:16px 0; letter-spacing:.06em; text-transform:uppercase; }
  .divider-text::before, .divider-text::after { content:''; flex:1; height:1px; background:var(--border); }
  #login-btn { width:100%; justify-content:center; padding:12px; font-size:12px; }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-mark"></div>
    <div class="logo-text">Agora<span>IQ</span></div>
  </a>
    <nav>
    <a href="/" class="active">Home</a>
    <a href="/marketplace">Marketplace</a>
    <a href="/screener">Screener</a>
    <a href="/pricing">Pricing</a>
    <a href="/about">About</a>
  </nav>
  <div class="header-right">
    <button class="menu-toggle" aria-label="Menu">☰</button>
    <a href="/signup" class="btn btn-cyan" style="font-size:11px">Sign Up</a>
  </div>
</header>

<div id="toast"></div>

<div class="auth-wrap">
  <div class="auth-card fade-up">
    <div style="text-align:center;margin-bottom:20px">
      <div class="logo-mark" style="margin:0 auto 12px"></div>
    </div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your AgoraIQ account</div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group" style="margin-bottom:8px">
      <label class="form-label">Password</label>
      <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div style="text-align:right;margin-bottom:20px">
      <a href="/forgot-password" style="font-size:10px;color:#8b90a8;text-decoration:none;letter-spacing:.04em">Forgot password?</a>
    </div>

    <button class="btn btn-cyan" id="login-btn" onclick="doLogin()">Sign In →</button>

    <div class="divider-text">or continue with</div>
    <a href="/api/v1/auth/discord" class="btn btn-ghost" style="width:100%;justify-content:center;padding:10px;font-size:11px;margin-bottom:8px">
      <span style="font-size:14px">💬</span> Discord
    </a>

    <div class="auth-footer">
      Don't have an account? <a href="/signup">Sign up free</a>
    </div>
  </div>
</div>

<script src="/assets/app.js"></script>
<script>
// If already logged in, skip to dashboard
if (localStorage.getItem('iq_token')) {
  const params = new URLSearchParams(window.location.search);
  window.location.href = params.get('redirect') || '/dashboard';
}

const params = new URLSearchParams(window.location.search);
const redirectTo = params.get('redirect') || '/dashboard';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');

  if (!email || !password) { toast('Please fill in all fields.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const res = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.message || data.error || 'Invalid credentials.');
    }

    // Store token — API may return it as token, accessToken, or jwt
    const token = data.token || data.accessToken || data.jwt || '';
    if (token) {
      localStorage.setItem('iq_token', token);
    }

    toast('Signed in!', 'success');
    setTimeout(() => { window.location.href = redirectTo; }, 400);

  } catch (err) {
    toast(err.message || 'Login failed.', 'error');
    btn.disabled = false;
    btn.textContent = 'Sign In →';
  }
}
</script>
<footer style="border-top:1px solid var(--border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:40px"><p style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace">© 2025 ChatLogic Insights LTD · AgoraIQ</p><div style="display:flex;gap:18px;flex-wrap:wrap"><a href="/terms" style="font-size:10px;color:#8b90a8;text-decoration:none">Terms</a><a href="/privacy" style="font-size:10px;color:#8b90a8;text-decoration:none">Privacy</a><a href="/disclaimer" style="font-size:10px;color:#8b90a8;text-decoration:none">Disclaimer</a><a href="/no-financial-advice" style="font-size:10px;color:#8b90a8;text-decoration:none">No Financial Advice</a><a href="/cookies" style="font-size:10px;color:#8b90a8;text-decoration:none">Cookies</a></div></footer></body>
</html>
