<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgoraIQ — News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Albert+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

<div id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-text">LOADING</div>
</div>

<header>
  <a href="/dashboard" class="logo">
    <div class="logo-mark"></div>
    <div class="logo-text">Agora<span>IQ</span></div>
  </a>
    <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/tracking" style="font-weight:700;color:var(--green)">Watchlist</a>
    <a href="/marketplace">Marketplace</a>
    <a href="/screener">Screener</a>
    <a href="/signals">Signals</a>
    <a href="/scanner">Scanner</a>
    <a href="/proof">Proof</a>
    <a href="/news" class="active">News</a>
  </nav>
  <div class="header-right">
    <button class="menu-toggle" aria-label="Menu">☰</button>
    <div class="user-badge"><div class="dot"></div><span id="username-badge">—</span></div>
    <button class="btn-logout" onclick="logout()">LOGOUT</button>
  </div>
</header>

<div id="toast"></div>

<main>

  <div class="section-header fade-up"><h2>Crypto Intelligence Feed</h2></div>

  <div class="filter-row fade-up">
    <input class="search-input" id="search" type="text" placeholder="Search news…" oninput="filterNews()">
    <select class="form-select" id="filter-cat" style="max-width:160px" onchange="filterNews()">
      <option value="">All categories</option>
      <option value="market">Market</option>
      <option value="signal">Signal Intel</option>
      <option value="defi">DeFi</option>
      <option value="macro">Macro</option>
    </select>
    <span id="result-count" style="font-size:11px;color:var(--muted);margin-left:auto"></span>
  </div>

  <div class="two-col fade-up" style="align-items:start">

    <div class="card" id="news-feed">
      <!-- Feed items populated by JS -->
      <div class="feed-item"><div class="skeleton" style="height:10px;width:30%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:80%;margin-bottom:6px"></div><div class="skeleton" style="height:10px;width:95%"></div></div>
      <div class="feed-item"><div class="skeleton" style="height:10px;width:25%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:75%;margin-bottom:6px"></div><div class="skeleton" style="height:10px;width:90%"></div></div>
      <div class="feed-item"><div class="skeleton" style="height:10px;width:35%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:85%;margin-bottom:6px"></div><div class="skeleton" style="height:10px;width:88%"></div></div>
      <div class="feed-item"><div class="skeleton" style="height:10px;width:20%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:70%;margin-bottom:6px"></div><div class="skeleton" style="height:10px;width:92%"></div></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card card-pad">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--text);margin-bottom:12px">📊 Market Sentiment</div>
        <div class="uid-row">
          <span class="uid-exchange">Fear & Greed</span>
          <span class="uid-badge" id="fear-greed">—</span>
        </div>
        <div class="uid-row">
          <span class="uid-exchange">BTC Dominance</span>
          <span class="uid-badge" id="btc-dom">—</span>
        </div>
        <div class="uid-row">
          <span class="uid-exchange">Trend</span>
          <span class="uid-badge" id="trend">—</span>
        </div>
      </div>

      <div class="card card-pad">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--text);margin-bottom:12px">🔥 Trending Pairs</div>
        <div id="trending-pairs">
          <div class="uid-row"><div class="skeleton" style="height:10px;width:60%"></div><div class="skeleton" style="height:10px;width:30%"></div></div>
          <div class="uid-row"><div class="skeleton" style="height:10px;width:55%"></div><div class="skeleton" style="height:10px;width:25%"></div></div>
          <div class="uid-row"><div class="skeleton" style="height:10px;width:65%"></div><div class="skeleton" style="height:10px;width:28%"></div></div>
        </div>
      </div>
    </div>

  </div>

</main>

<script src="/assets/app.js"></script>
<script src="/assets/auth.js"></script>
<script>
let allNews = [];

async function pageInit() {
  try {
    const data = await apiFetch('/api/v1/news');
    allNews = data?.items || data || [];
    filterNews();
    loadSentiment();
  } catch (err) {
    toast('Could not load news feed.', 'error');
    document.getElementById('news-feed').innerHTML = '<div class="empty-state"><div class="icon">📰</div><p>News feed unavailable.</p></div>';
  }
}

function filterNews() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-cat').value;
  let list = allNews.filter(n => {
    if (q && !(n.title || '').toLowerCase().includes(q) && !(n.excerpt || '').toLowerCase().includes(q)) return false;
    if (cat && (n.category || '').toLowerCase() !== cat) return false;
    return true;
  });
  document.getElementById('result-count').textContent = `${list.length} article${list.length !== 1 ? 's' : ''}`;
  renderNews(list);
}

function renderNews(list) {
  const feed = document.getElementById('news-feed');
  if (!list.length) {
    feed.innerHTML = '<div class="empty-state"><div class="icon">📰</div><p>No articles match your search.</p></div>';
    return;
  }
  const catColors = { market:'badge-cyan', signal:'badge-amber', defi:'badge-green', macro:'badge-muted' };
  feed.innerHTML = list.map(n => {
    const catClass = catColors[(n.category||'').toLowerCase()] || 'badge-muted';
    return `
      <div class="feed-item">
        <div class="feed-meta">
          <span class="badge ${catClass}">${escapeHTML(n.category || 'NEWS')}</span>
          <span>${fmtRelative(n.publishedAt || n.createdAt)}</span>
          ${n.source ? `<span>${escapeHTML(n.source)}</span>` : ''}
        </div>
        <div class="feed-title">${escapeHTML(n.title || '—')}</div>
        <div class="feed-excerpt">${escapeHTML(n.excerpt || '')}</div>
        ${n.url ? `<div style="margin-top:8px"><a href="${escapeHTML(n.url)}" target="_blank" class="btn btn-ghost btn-sm">Read more →</a></div>` : ''}
      </div>
    `;
  }).join('');
}

async function loadSentiment() {
  try {
    const data = await apiFetch('/api/v1/markets');
    document.getElementById('fear-greed').textContent = data?.fearGreed || '—';
    document.getElementById('btc-dom').textContent = data?.btcDominance ? data.btcDominance.toFixed(1) + '%' : '—';
    document.getElementById('trend').textContent = data?.trend || 'Neutral';

    const trending = data?.trending || [];
    if (trending.length) {
      document.getElementById('trending-pairs').innerHTML = trending.slice(0, 5).map(p => `
        <div class="uid-row">
          <span class="uid-exchange"><span style="color:var(--cyan)">◆</span> ${escapeHTML(p.pair || p.symbol || '—')}</span>
          <span class="uid-badge ${(p.change24h || 0) >= 0 ? '' : 'pending'}">${fmtPct(p.change24h)}</span>
        </div>
      `).join('');
    }
  } catch (_) {}
}
</script>
<footer style="border-top:1px solid var(--border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:40px"><p style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace">© 2025 ChatLogic Insights LTD · AgoraIQ</p><div style="display:flex;gap:18px;flex-wrap:wrap"><a href="/terms" style="font-size:10px;color:#8b90a8;text-decoration:none">Terms</a><a href="/privacy" style="font-size:10px;color:#8b90a8;text-decoration:none">Privacy</a><a href="/disclaimer" style="font-size:10px;color:#8b90a8;text-decoration:none">Disclaimer</a><a href="/no-financial-advice" style="font-size:10px;color:#8b90a8;text-decoration:none">No Financial Advice</a><a href="/cookies" style="font-size:10px;color:#8b90a8;text-decoration:none">Cookies</a></div></footer></body>
</html>
