<svg xmlns="http://www.w3.org/2000/svg" width="260" height="92" viewBox="0 0 260 92">
  <defs>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="crown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="260" height="92" rx="15" fill="none" stroke="url(#border)" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>
  <rect x="3" y="3" width="254" height="86" rx="13" fill="#0d0d1a"/>
  <rect x="9" y="10" width="8" height="72" rx="4" fill="url(#bar)" filter="url(#soft)"/>
  <g transform="translate(53,46)" filter="url(#glow)">
    <polygon points="-20,8 -14,-12 -7,0 0,-20 7,0 14,-12 20,8" fill="url(#crown)" stroke="url(#border)" stroke-width="1.5"/>
    <rect x="-20" y="8" width="40" height="8" rx="2" fill="url(#crown)" stroke="url(#border)" stroke-width="1"/>
    <circle cx="-14" cy="-6" r="2" fill="#fde68a" opacity="0.7"/>
    <circle cx="0" cy="-13" r="2.5" fill="#fde68a" opacity="0.8"/>
    <circle cx="14" cy="-6" r="2" fill="#fde68a" opacity="0.7"/>
  </g>
  <text x="84" y="48" font-family="Arial Black, sans-serif" font-weight="900" font-size="28" letter-spacing="4" fill="url(#txt)" filter="url(#glow)">ELITE</text>
  <text x="85" y="67" font-family="'Courier New', monospace" font-size="10" letter-spacing="4" fill="#475569">AGORAIQ</text>
  <rect x="187" y="28" width="62" height="32" rx="9" fill="none" stroke="url(#border)" stroke-width="1.5" filter="url(#soft)"/>
  <rect x="188" y="29" width="60" height="30" rx="8" fill="#0a0a14"/>
  <text x="218" y="49" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="10" letter-spacing="2" fill="#d4a574">TIER</text>
</svg>
