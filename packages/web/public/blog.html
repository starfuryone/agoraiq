<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgoraIQ — Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Albert+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-mark"></div>
    <div class="logo-text">Agora<span>IQ</span></div>
  </a>
    <nav>
    <a href="/">Home</a>
    <a href="/marketplace">Marketplace</a>
    <a href="/screener">Screener</a>
    <a href="/pricing">Pricing</a>
    <a href="/about">About</a>
  </nav>
  <div class="header-right">
    <button class="menu-toggle" aria-label="Menu">☰</button>
    <a href="/login" class="btn btn-ghost" style="font-size:11px">Login</a>
    <a href="/signup" class="btn btn-cyan" style="font-size:11px">Sign Up</a>
  </div>
</header>

<div id="toast"></div>

<main>

  <div style="padding:40px 0 28px" class="fade-up">
    <div class="hero-eyebrow">KNOWLEDGE BASE</div>
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:30px;letter-spacing:-1px;color:var(--text)">Blog & Insights</div>
    <div style="font-size:12px;color:var(--muted);margin-top:6px">Signal intelligence, market analysis, and platform updates.</div>
  </div>

  <div class="filter-row fade-up">
    <input class="search-input" id="search" type="text" placeholder="Search articles…" oninput="filterPosts()">
    <select class="form-select" id="filter-cat" style="max-width:160px" onchange="filterPosts()">
      <option value="">All topics</option>
      <option value="platform">Platform</option>
      <option value="analysis">Analysis</option>
      <option value="education">Education</option>
      <option value="updates">Updates</option>
    </select>
  </div>

  <div class="two-col fade-up" style="align-items:start">

    <!-- Post list -->
    <div id="posts-feed" style="grid-column:1/-1">
      <!-- Populated by JS or static placeholder -->
    </div>

  </div>

</main>

<footer>
  <div class="footer-left">© 2025 AgoraIQ · ChatLogic Insights LTD</div>
  <div class="footer-links">
    <a href="/privacy">Privacy</a>
    <a href="/disclaimer">Disclaimer</a>
    <a href="/no-financial-advice">No Financial Advice</a>
    <a href="/terms">Terms</a>
    <a href="/about">About</a>
  </div>
</footer>

<script src="/assets/app.js"></script>
<script>
// Static placeholder posts — replace with API call when blog endpoint is ready
const POSTS = [
  {
    slug: 'immutable-proof-hashing',
    title: 'How AgoraIQ\'s Immutable Proof System Works',
    category: 'platform',
    excerpt: 'Every signal on AgoraIQ is SHA-256 hashed the moment it arrives. Here\'s a deep dive into why this matters and how it eliminates cherry-picking.',
    publishedAt: new Date(Date.now() - 2 * 86400000).toISOString(),
    readTime: '5 min read',
  },
  {
    slug: 'vol-adjusted-scoring',
    title: 'Volatility-Adjusted Scoring: Why Raw Win Rate Lies',
    category: 'education',
    excerpt: 'A 70% win rate during a sideways market is very different from 70% during a volatile trending period. We explain how our scoring normalises for this.',
    publishedAt: new Date(Date.now() - 7 * 86400000).toISOString(),
    readTime: '7 min read',
  },
  {
    slug: 'marketplace-100-providers',
    title: 'AgoraIQ Crosses 100 Signal Providers',
    category: 'updates',
    excerpt: 'We\'ve reached a major milestone: 100+ Telegram and Discord signal channels are now tracked, hashed, and scored on the AgoraIQ marketplace.',
    publishedAt: new Date(Date.now() - 14 * 86400000).toISOString(),
    readTime: '3 min read',
  },
  {
    slug: 'cherry-pick-detection',
    title: 'Cherry-Pick Detection: How We Catch Manipulation',
    category: 'platform',
    excerpt: 'Signal providers know they\'re being watched. Our detection algorithms identify suspiciously selective reporting patterns and flag providers accordingly.',
    publishedAt: new Date(Date.now() - 21 * 86400000).toISOString(),
    readTime: '6 min read',
  },
  {
    slug: 'trade-to-earn',
    title: 'Introducing Trade-to-Earn: Earn Free Premium',
    category: 'updates',
    excerpt: 'Trade on our affiliate exchanges and earn commissions. Reach $25/month and get a free Premium month automatically.',
    publishedAt: new Date(Date.now() - 30 * 86400000).toISOString(),
    readTime: '4 min read',
  },
  {
    slug: 'cornix-integration',
    title: 'Cornix Format Signal Parsing: Under the Hood',
    category: 'education',
    excerpt: 'How AgoraIQ parses Cornix-format signals with regex and LLM fallbacks, and why signal parsing accuracy matters for outcome tracking.',
    publishedAt: new Date(Date.now() - 45 * 86400000).toISOString(),
    readTime: '8 min read',
  },
];

let filtered = [...POSTS];

function filterPosts() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-cat').value;
  filtered = POSTS.filter(p => {
    if (q && !p.title.toLowerCase().includes(q) && !p.excerpt.toLowerCase().includes(q)) return false;
    if (cat && p.category !== cat) return false;
    return true;
  });
  renderPosts();
}

const catColors = { platform: 'badge-cyan', analysis: 'badge-amber', education: 'badge-green', updates: 'badge-muted' };

function renderPosts() {
  const el = document.getElementById('posts-feed');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>No posts match your search.</p></div>';
    return;
  }
  el.innerHTML = `<div class="card">${filtered.map(p => `
    <div class="feed-item">
      <div class="feed-meta">
        <span class="badge ${catColors[p.category] || 'badge-muted'}">${p.category.toUpperCase()}</span>
        <span>${fmtDate(p.publishedAt)}</span>
        <span>${p.readTime}</span>
      </div>
      <div class="feed-title">${escapeHTML(p.title)}</div>
      <div class="feed-excerpt">${escapeHTML(p.excerpt)}</div>
      <div style="margin-top:10px">
        <a href="/blog/${p.slug}" class="btn btn-ghost btn-sm">Read more →</a>
      </div>
    </div>
  `).join('')}</div>`;
}

renderPosts();
</script>
</body>
</html>
