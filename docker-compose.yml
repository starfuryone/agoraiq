version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agoraiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agoraiq
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: agoraiq
    volumes:
      - agoraiq_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agoraiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agoraiq-redis
    restart: unless-stopped
    volumes:
      - agoraiq_redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: agoraiq-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://agoraiq:Desf19848@172.17.0.1:5432/agoraiq?schema=public"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: agoraiq-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./packages/web/public:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  agoraiq_postgres_data:
    external: true
  agoraiq_redis_data:
    external: true
